<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ホワイトアウトサバイバル　建造計算ツール</title>

<style>
:root {
  --bg-night: #08111f;
  --bg-ice: #1a3354;
  --panel: rgba(8, 20, 36, 0.82);
  --line: rgba(140, 194, 245, 0.28);
  --line-strong: rgba(255, 225, 164, 0.52);
  --text: #f4f8ff;
  --muted: #bdd0ea;
  --gold: #ffe6ae;
  --accent: #9ad8ff;
}

* { box-sizing: border-box; }

body {
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  padding: 16px;
  max-width: 900px;
  margin: 0 auto;
  color: var(--text);
  min-height: 100vh;
  background:
    linear-gradient(122deg, rgba(3, 10, 21, 0.78), rgba(4, 10, 20, 0.9)),
    url("https://www.whiteoutsurvival.com/wp-content/uploads/2024/01/kv-pc.jpg") center top/cover fixed no-repeat,
    radial-gradient(900px 460px at 93% -8%, rgba(122, 199, 255, 0.3), transparent 62%),
    radial-gradient(720px 420px at 5% 0%, rgba(255, 212, 122, 0.2), transparent 60%),
    linear-gradient(170deg, var(--bg-night) 0%, #0d1c31 42%, var(--bg-ice) 100%);
}

.app-shell {
  position: relative;
}

.app-shell::before {
  content: "";
  position: absolute;
  inset: -8px;
  border: 1px solid rgba(245, 227, 176, 0.22);
  border-radius: 18px;
  pointer-events: none;
}

.header {
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
  padding: 14px 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--line-strong);
  background:
    linear-gradient(165deg, rgba(42, 66, 96, 0.35), rgba(6, 15, 29, 0.92)),
    repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 10px);
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.34), inset 0 0 0 1px rgba(255,255,255,0.05);
}
.hero-visual{
  margin-top: 12px;
  display: flex;
  justify-content: center;
  gap: 12px;
  align-items: center;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(172, 211, 252, 0.38);
  background: linear-gradient(135deg, rgba(17,34,58,0.88), rgba(11,22,40,0.64));
  backdrop-filter: blur(2px);
}
.hero-logo{
  width: 96px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 10px 20px rgba(0,0,0,.25);
}

.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(118deg, rgba(7, 17, 32, 0.94) 22%, rgba(7, 17, 32, 0.68) 70%, rgba(7, 17, 32, 0.95) 100%),
    url("https://www.whiteoutsurvival.com/wp-content/uploads/2024/01/kv-pc.jpg") center 30%/cover no-repeat;
  z-index: 0;
  opacity: 0.96;
}

.header > * {
  position: relative;
  z-index: 1;
}

.badge {
  display: inline-block;
  margin-bottom: 6px;
  padding: 3px 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  border-radius: 999px;
  color: #0f2138;
  background: linear-gradient(180deg, #fceebe, #dbb56b);
  font-weight: 800;
}

.title {
  font-size: 23px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: var(--gold);
  text-shadow: 0 1px 0 #5d4217, 0 0 14px rgba(255, 230, 176, 0.2);
}

.meta {
  margin-top: 4px;
  font-size: 12px;
  color: var(--muted);
}

.meta a, .footer a { color: #a6d7ff; text-decoration: none; }
.official-strip{
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.official-chip{
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 7px;
  border-radius: 999px;
  border: 1px solid rgba(172, 211, 252, 0.42);
  background: rgba(8, 22, 40, 0.7);
  font-size: 10px;
  color: #d6e8ff;
}
.official-chip img{
  width: 13px;
  height: 13px;
  object-fit: contain;
}

.release-note {
  margin-top: 10px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(255, 225, 164, 0.35);
  background: linear-gradient(145deg, rgba(10, 22, 40, 0.82), rgba(22, 39, 63, 0.65));
  font-size: 11px;
  color: #d6e8ff;
  line-height: 1.5;
}
.release-note strong {
  color: var(--gold);
}
.body-watermark {
  position: fixed;
  left: 14px;
  bottom: 14px;
  width: 110px;
  opacity: 0.2;
  pointer-events: none;
  filter: drop-shadow(0 0 8px rgba(162, 210, 255, 0.5));
}

.section, table, .card {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: linear-gradient(165deg, var(--panel), rgba(17, 31, 52, 0.75));
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.26), inset 0 0 0 1px rgba(255,255,255,0.03);
}

table { width: 100%; border-collapse: collapse; margin-bottom: 10px; overflow: hidden; }

th, td {
  border-bottom: 1px solid rgba(157, 186, 220, 0.2);
  padding: 8px 6px;
  font-size: 13px;
}

th {
  color: var(--gold);
  background: linear-gradient(180deg, rgba(255, 227, 157, 0.18), rgba(255, 227, 157, 0.03));
  font-weight: 700;
}

select, input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  margin-bottom: 6px;
  font-size: 14px;
  color: var(--text);
  border: 1px solid rgba(148, 184, 225, 0.45);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(7, 15, 28, 0.96), rgba(11, 22, 40, 0.78));
}

select {
  background-color: #0b1628;
  color: var(--text);
}

select option {
  color: #0d1a2d;
  background-color: #ffffff;
}

input::placeholder { color: #7f98bc; }
label { font-size: 12px; color: #cedef4; }

button {
  width: 100%;
  padding: 10px;
  border-radius: 9px;
  border: 1px solid rgba(160, 207, 250, 0.88);
  background: linear-gradient(180deg, #95d1ff 0%, #3b77b0 100%);
  color: #f5fbff;
  font-size: 14px;
  font-weight: 700;
  text-shadow: 0 1px 0 rgba(11, 24, 39, 0.92);
  cursor: pointer;
}

button:hover { filter: brightness(1.08); box-shadow: 0 4px 14px rgba(142, 202, 255, 0.32); }
button:active { transform: translateY(1px); }

.action-main {
  border-color: rgba(255, 228, 163, 0.85);
  background: linear-gradient(180deg, #f6dd9f 0%, #b9802e 100%);
  color: #1e2636;
  text-shadow: none;
}

td button {
  padding: 6px 0;
  background: linear-gradient(180deg, #ff9ea3 0%, #bf4e58 100%);
  border-color: rgba(255, 186, 186, 0.95);
}

.section { padding: 12px; margin: 12px 0; }
.group-title { font-size: 13px; color: var(--gold); font-weight: 700; margin-bottom: 8px; letter-spacing: 0.04em; }

.buff-buttons { display: flex; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
.buff-buttons button { flex: 1; min-width: 60px; padding: 6px; font-size: 12px; }

.switch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
.switch {
  background: linear-gradient(180deg, rgba(9, 17, 30, 0.95), rgba(14, 25, 42, 0.72));
  border: 1px solid rgba(150, 187, 230, 0.35);
  border-radius: 9px;
  padding: 8px;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #dde9fb;
}
.switch-label {
  white-space: nowrap;
  word-break: keep-all;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.info { font-size: 11px; color: var(--accent); margin-bottom: 6px; }
.result { display: grid; gap: 10px; margin-top: 10px; }
.card { padding: 12px; }

.time {
  font-size: 28px;
  text-align: center;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 1px 0 #5f4319;
}

.resources { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
.resource-row { display: flex; align-items: center; gap: 6px; }
.resource-icon { width: 20px; height: 20px; object-fit: contain; border-radius: 4px; }
textarea { height: 110px; }

.footer {
  text-align: center;
  font-size: 11px;
  color: #89a3c6;
  margin: 14px 0 8px;
}

.app-shell::after {
  content: "";
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 120px;
  height: 120px;
  background: url("https://www.whiteoutsurvival.com/wp-content/uploads/2024/01/cropped-favicon-32x32.png") center/contain no-repeat;
  opacity: 0.22;
  pointer-events: none;
  filter: drop-shadow(0 0 8px rgba(162, 210, 255, 0.5));
}

@media (max-width: 640px) {
  body { padding: 10px; }
  .switch-grid, .resources { grid-template-columns: 1fr; }
  .title { font-size: 19px; }
  .hero-visual{ justify-content: flex-start; }
}
</style>
</head>

<body>
<div class="app-shell">

<div class="header">
  <div class="badge">UNOFFICIAL FAN TOOL</div>
  <div class="title">ホワイトアウトサバイバル　建造計算ツール</div>
  <div class="meta">
    Version 1.2.3 |
    <a href="history.html">改訂履歴</a>
  </div>
  <div class="meta">入力内容は自動保存されます。構成保存・共有キーは建物/レベルに加えてバフ設定も含みます。</div>
  <div class="official-strip">
    <span class="official-chip"><img src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/05/item_icon_103.png" alt="木">木</span>
    <span class="official-chip"><img src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/05/item_icon_105.png" alt="鉄">鉄</span>
    <span class="official-chip"><img src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/07/item_icon_100081.png" alt="火晶">火晶</span>
  </div>
  <div class="hero-visual">
    <img class="hero-logo" src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/05/item_icon_103.png" alt="公式素材 木アイコン">
    <img class="hero-logo" src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/05/item_icon_105.png" alt="公式素材 鉄アイコン">
    <img class="hero-logo" src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/07/item_icon_100081.png" alt="公式素材 火晶アイコン">
  </div>
  <div class="release-note">画像の表示安定性を改善し、未表示だったウォーターマーク画像を修正しました。</div>
</div>
<img class="body-watermark" src="https://gom-s3-user-avatar.s3.us-west-2.amazonaws.com/wp-content/uploads/2023/07/item_icon_100081.png" alt="Whiteout Survival watermark">

<table>
<thead>
<tr>
<th>建物</th><th>開始</th><th>終了</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button class="action-main" onclick="addRow()">＋追加</button>

<!-- 建造速度 -->
<div class="section">
<div class="group-title">建造速度バフ</div>

<label>基礎建造バフ(%) ※研究,島,ジンマンスキル,VIP,ステーションを含む</label>
<input id="baseBuff" type="number" value="80" step="0.1">

<div class="buff-buttons">
  <button onclick="adjustBuff(-10)">-10</button>
  <button onclick="adjustBuff(-1)">-1</button>
  <button onclick="adjustBuff(-0.1)">-0.1</button>
  <button onclick="adjustBuff(0.1)">+0.1</button>
  <button onclick="adjustBuff(1)">+1</button>
  <button onclick="adjustBuff(10)">+10</button>
</div>

<label>ハイエナスキル</label>
<select id="pet"></select>
<div id="petInfo" class="info"></div>

<label>副執政官</label>
<select id="sub">
<option value="0">なし</option>
<option value="10">+10%</option>
<option value="15">+15%</option>
</select>

<div class="switch-grid">
  <div class="switch">
    <span class="switch-label">領主司令</span>
    <input type="checkbox" id="lord">
  </div>
  <div class="switch">
    <span class="switch-label">執政官スキル</span>
    <input type="checkbox" id="gov">
  </div>
</div>

<label>アグネススキル</label>
<select id="agnes"></select>
<div id="agnesInfo" class="info"></div>

</div>

<!-- 資源 -->
<div class="section">
<div class="group-title">資源消費バフ</div>

<label>ジンマンスキル</label>
<select id="jinman"></select>
<div id="jinmanInfo" class="info"></div>

</div>

<button class="action-main" onclick="calc()">計算</button>

<div class="result">

<div class="card">
<div class="time" id="result">--</div>
</div>

<div class="card resources" id="detail"></div>

<div class="card">
<button onclick="copyResult()">📋 コピー（ゲームチャット用）</button>
<textarea id="copyText" readonly></textarea>
</div>

</div>

<div class="section">
  <div class="group-title">構成の保存・共有</div>

  <label>保存済み構成</label>
  <select id="presetSelect"></select>

  <label>構成名</label>
  <input id="presetName" type="text">

  <div class="buff-buttons">
    <button id="createPresetBtn" type="button">新規作成</button>
    <button id="savePresetBtn" type="button">上書き保存</button>
    <button id="deletePresetBtn" type="button">削除</button>
  </div>

  <label>共有用ユニークキー</label>
  <input id="shareKey" type="text" readonly placeholder="キー生成後に表示">

  <div class="buff-buttons">
    <button id="generateKeyBtn" type="button">キー生成</button>
    <button id="copyKeyBtn" type="button">キーをコピー</button>
  </div>

  <label>復元キー入力</label>
  <input id="restoreKey" type="text" placeholder="受け取ったキーを貼り付け">
  <div class="buff-buttons">
    <button id="restoreKeyBtn" type="button">キーから復元</button>
  </div>
</div>

<div class="footer">
© #3352 ヒゲのアニキ
</div>

<script src="app.js"></script>

</div>
</body>
</html>
